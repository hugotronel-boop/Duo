<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>DUO — Questions à deux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,600;1,9..144,700&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF3E1;
    --paper-deep:#F1E4C6;
    --card:#F7ECD3;
    --ink:#2B2013;
    --ink-soft:#5A4D38;
    --rust:#D9531E;
    --teal:#136B60;
    --mustard:#E2A317;
    --maroon:#7C1F2E;
    --line:#D8C293;
    --line-soft:rgba(43,32,19,.14);
    --radius:12px;
    --glass-blur:22px;
    --glass-bg:rgba(255,255,255,.30);
    --glass-bg-strong:rgba(255,255,255,.42);
    --glass-border:rgba(255,255,255,.6);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; overflow:hidden;}
  body{
    background-color:var(--paper);
    background-image:
      radial-gradient(circle at 12% 0%, rgba(217,83,30,.24), transparent 42%),
      radial-gradient(circle at 92% 6%, rgba(19,107,96,.24), transparent 46%),
      radial-gradient(circle at 50% 100%, rgba(226,163,23,.20), transparent 50%),
      radial-gradient(circle at 100% 55%, rgba(124,31,46,.16), transparent 45%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    position:relative;
  }
  /* grain overlay */
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:200; opacity:.05; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .display{font-family:'Fraunces', serif; font-style:italic; font-weight:700;}
  .mono{font-family:'Space Mono', monospace;}

  /* shared glass highlight sweep */
  .card::before, .id-pill::before, .chip::before, .gear-btn::before,
  .modal::before, nav.tabbar::before, #topFixed::before{
    content:"";
    position:absolute; top:-90%; left:-25%; width:150%; height:110%;
    background:linear-gradient(120deg, transparent 32%, rgba(255,255,255,.55) 50%, transparent 68%);
    transform:rotate(-8deg);
    pointer-events:none;
  }

  /* APP SHELL — header/nav stay put, only the middle zone scrolls */
  #appShell{
    max-width:560px; margin:0 auto; position:relative; z-index:1;
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  /* TOP GLASS BAR */
  #topFixed{
    flex-shrink:0; position:relative; overflow:hidden; z-index:5;
    padding: calc(16px + env(safe-area-inset-top)) 18px 16px 18px;
    background:var(--glass-bg);
    backdrop-filter:blur(var(--glass-blur)) saturate(180%);
    -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);
    border-bottom:1px solid var(--glass-border);
    box-shadow:0 8px 26px rgba(43,32,19,.10), inset 0 1px 0 rgba(255,255,255,.5);
  }
  #scrollArea{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:contain;
    padding:0 18px;
    position:relative; z-index:1;
  }
  #app{ padding-bottom:32px; padding-top:18px; }

  /* HEADER */
  header{
    display:flex; align-items:center; justify-content:space-between;
  }
  .wordmark-wrap{position:relative;}
  .wordmark{
    font-size:30px; font-weight:900; letter-spacing:-0.5px;
    color:var(--ink); position:relative; display:inline-block;
  }
  .wordmark::after{
    content:"DUO"; position:absolute; left:2.5px; top:2.5px; z-index:-1;
    color:var(--rust); opacity:.6;
  }
  .wordmark::before{
    content:"DUO"; position:absolute; left:-2px; top:-1px; z-index:-1;
    color:var(--teal); opacity:.5;
  }
  .eyebrow{ color:var(--ink-soft); font-size:10.5px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-top:4px;}
  .gear-btn{
    width:44px; height:44px; border-radius:50%;
    background:var(--glass-bg-strong); border:1px solid var(--glass-border);
    backdrop-filter:blur(16px) saturate(170%); -webkit-backdrop-filter:blur(16px) saturate(170%);
    display:flex; align-items:center; justify-content:center;
    font-size:18px; cursor:pointer; color:var(--ink); flex-shrink:0;
    position:relative; overflow:hidden;
    box-shadow:0 6px 16px rgba(43,32,19,.14), inset 0 1px 0 rgba(255,255,255,.65);
  }
  .gear-btn:active{ transform:scale(.94); }

  /* IDENTITY SWITCH */
  .identity-bar{
    display:flex; gap:10px; margin-top:16px;
  }
  .id-pill{
    flex:1; padding:12px 10px; border-radius:16px;
    border:1.5px solid var(--glass-border); background:var(--glass-bg);
    backdrop-filter:blur(16px) saturate(170%); -webkit-backdrop-filter:blur(16px) saturate(170%);
    color:var(--ink-soft); font-weight:700; font-size:13.5px;
    text-align:center; cursor:pointer; transition:.15s;
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Space Mono', monospace; text-transform:uppercase; letter-spacing:.5px;
    position:relative; overflow:hidden;
    box-shadow:0 4px 14px rgba(43,32,19,.08), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .id-pill:active{ transform:scale(.97); }
  .id-pill .dot{width:8px;height:8px;border-radius:50%; background:var(--ink-soft);}
  .id-pill.active.p1{border-color:rgba(217,83,30,.55); color:var(--rust); background:rgba(217,83,30,.20);}
  .id-pill.active.p1 .dot{background:var(--rust);}
  .id-pill.active.p2{border-color:rgba(19,107,96,.55); color:var(--teal); background:rgba(19,107,96,.20);}
  .id-pill.active.p2 .dot{background:var(--teal);}

  /* SECTION HEAD */
  .section-head{margin:4px 0 18px 0; position:relative;}
  .section-head h1{font-size:26px; margin:0 0 6px 0;}
  .section-head p{margin:0; color:var(--ink-soft); font-size:13.5px; font-family:'Space Mono',monospace;}

  /* FORM (Ajouter) */
  .field-label{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-soft); margin:22px 0 10px 0; font-family:'Space Mono',monospace;}
  .chip-row{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    padding:9px 14px; border-radius:100px; font-size:13px; font-weight:600;
    border:1.5px solid var(--glass-border); background:var(--glass-bg); color:var(--ink);
    backdrop-filter:blur(14px) saturate(170%); -webkit-backdrop-filter:blur(14px) saturate(170%);
    cursor:pointer; transition:.15s; display:flex; align-items:center; gap:6px;
    position:relative; overflow:hidden;
    box-shadow:0 3px 10px rgba(43,32,19,.06), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .chip.selected{ color:var(--paper); border-color:transparent; }
  textarea, input[type=text]{
    width:100%; background:rgba(255,255,255,.42); border:1.5px solid var(--glass-border);
    backdrop-filter:blur(14px) saturate(160%); -webkit-backdrop-filter:blur(14px) saturate(160%);
    border-radius:14px; color:var(--ink); font-family:'Work Sans',sans-serif; font-size:15px;
    padding:14px; resize:none; outline:none;
  }
  textarea:focus, input[type=text]:focus{ border-color:var(--rust); }
  textarea{min-height:100px;}
  .submit-btn{
    width:100%; margin-top:24px; padding:16px; border:1px solid rgba(255,255,255,.45); border-radius:18px;
    font-family:'Space Mono', monospace; font-weight:700; font-size:14px; color:var(--paper);
    background:linear-gradient(135deg, rgba(43,32,19,.80), rgba(43,32,19,.62));
    backdrop-filter:blur(var(--glass-blur)) saturate(180%); -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);
    text-transform:uppercase; letter-spacing:1px;
    cursor:pointer; transition:.15s; transform:rotate(-0.4deg);
    position:relative; overflow:hidden;
    box-shadow:0 10px 24px rgba(43,32,19,.24), inset 0 1px 0 rgba(255,255,255,.5), inset 0 -10px 14px rgba(0,0,0,.12);
  }
  .submit-btn::before{
    content:""; position:absolute; top:-60%; left:-15%; width:130%; height:90%;
    background:radial-gradient(ellipse at top, rgba(255,255,255,.55), transparent 65%);
    transform:rotate(-5deg); pointer-events:none;
  }
  .submit-btn:active{transform:scale(.97) rotate(-0.4deg);}
  .submit-btn:disabled{opacity:.35; pointer-events:none;}

  /* CARDS common - postcard style, now in glass */
  .card{
    background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:22px;
    padding:18px; margin-bottom:16px; position:relative; overflow:hidden;
    backdrop-filter:blur(var(--glass-blur)) saturate(170%); -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(170%);
    box-shadow:0 12px 30px rgba(43,32,19,.14), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px;}
  .cat-tag{
    font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:100px; display:inline-flex; align-items:center; gap:5px;
    color:var(--paper); white-space:nowrap; font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:.5px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.35);
  }
  .del-btn{background:none; border:none; color:var(--ink-soft); font-size:16px; cursor:pointer; padding:2px 6px; line-height:1;}
  .q-text{font-size:17px; font-weight:600; line-height:1.4; margin:0 0 10px 0; font-family:'Fraunces',serif;}
  .q-meta{font-size:11.5px; color:var(--ink-soft); margin-bottom:4px; font-family:'Space Mono',monospace;}

  /* postmark stamp */
  .postmark{
    position:absolute; top:14px; right:14px; width:56px; height:56px; border-radius:50%;
    border:2px dashed var(--maroon); display:flex; align-items:center; justify-content:center;
    transform:rotate(12deg); opacity:.5; flex-shrink:0;
  }
  .postmark span{font-size:8px; font-weight:700; color:var(--maroon); font-family:'Space Mono',monospace; text-transform:uppercase; text-align:center; letter-spacing:.5px; line-height:1.1;}

  /* PENDING status */
  .status-row{
    display:flex; align-items:center; gap:9px; padding:11px 12px; border-radius:12px;
    background:rgba(255,255,255,.25); border:1.5px dashed rgba(43,32,19,.28);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    font-size:12.5px; color:var(--ink-soft); margin-top:8px; font-family:'Space Mono',monospace;
  }
  .pulse-dot{width:8px; height:8px; border-radius:50%; background:var(--mustard); flex-shrink:0; animation:pulse 1.4s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(226,163,23,.6);}70%{box-shadow:0 0 0 8px rgba(226,163,23,0);}100%{box-shadow:0 0 0 0 rgba(226,163,23,0);}}
  .answer-form{margin-top:10px;}
  .answer-form textarea{min-height:70px; margin-bottom:8px;}
  .mini-btn{
    padding:12px 16px; border:1px solid rgba(255,255,255,.5); border-radius:14px; font-weight:700; font-size:12.5px;
    color:var(--paper); cursor:pointer; width:100%; font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:1px;
    backdrop-filter:blur(16px) saturate(170%); -webkit-backdrop-filter:blur(16px) saturate(170%);
    position:relative; overflow:hidden; transition:.15s;
    box-shadow:0 8px 18px rgba(43,32,19,.2), inset 0 1px 0 rgba(255,255,255,.55), inset 0 -8px 12px rgba(0,0,0,.12);
  }
  .mini-btn::before{
    content:""; position:absolute; top:-70%; left:-15%; width:130%; height:90%;
    background:radial-gradient(ellipse at top, rgba(255,255,255,.6), transparent 65%);
    transform:rotate(-5deg); pointer-events:none;
  }
  .mini-btn:active{transform:scale(.97);}

  /* REVEALED answers */
  .answers{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
  .answer-bubble{
    border-radius:14px; padding:13px 14px; border:1.5px solid;
    background:rgba(255,255,255,.30);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .answer-bubble .who{font-size:11.5px; font-weight:800; margin-bottom:6px; display:flex; align-items:center; gap:7px; font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:.5px;}
  .answer-bubble p{margin:0; font-size:15px; line-height:1.5; color:var(--ink); font-family:'Fraunces',serif; font-weight:500;}
  .avatar{width:20px; height:20px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:900; color:var(--paper); font-family:'Space Mono',monospace;}

  /* EMPTY STATE */
  .empty{ text-align:center; padding:64px 20px; color:var(--ink-soft); }
  .empty .emoji{font-size:40px; display:block; margin-bottom:16px;}
  .empty p{margin:0; font-size:13.5px; line-height:1.6; font-family:'Space Mono',monospace;}

  /* BOTTOM NAV — floating glass pill, Apple style */
  nav.tabbar{
    flex-shrink:0; position:relative; overflow:hidden;
    margin:0 14px calc(14px + env(safe-area-inset-bottom)) 14px;
    padding:8px;
    border-radius:28px;
    background:var(--glass-bg-strong);
    backdrop-filter:blur(28px) saturate(190%); -webkit-backdrop-filter:blur(28px) saturate(190%);
    border:1px solid var(--glass-border);
    box-shadow:0 16px 38px rgba(43,32,19,.20), inset 0 1px 0 rgba(255,255,255,.6);
    display:flex; justify-content:center;
  }
  .tab-inner{display:flex; gap:4px; max-width:560px; width:100%;}
  .tab-btn{
    flex:1; background:none; border:none; color:var(--ink-soft); font-family:'Space Mono', monospace;
    display:flex; flex-direction:column; align-items:center; gap:4px; padding:9px 4px; cursor:pointer;
    font-size:10px; font-weight:700; border-radius:20px; position:relative; text-transform:uppercase; letter-spacing:.5px;
    transition:.15s;
  }
  .tab-btn .ic{font-size:21px;}
  .tab-btn.active{
    color:var(--ink); background:rgba(255,255,255,.55);
    box-shadow:0 4px 12px rgba(43,32,19,.14), inset 0 1px 0 rgba(255,255,255,.8);
  }
  .tab-btn .badge{
    position:absolute; top:0; right:22%; background:var(--rust); color:var(--paper); font-size:9px;
    min-width:15px; height:15px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800;
  }

  /* MODAL (setup) */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(43,32,19,.4); backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:24px;
  }
  .modal{
    background:var(--glass-bg-strong); border:1px solid var(--glass-border); border-radius:26px;
    padding:28px 24px; max-width:400px; width:100%;
    backdrop-filter:blur(34px) saturate(190%); -webkit-backdrop-filter:blur(34px) saturate(190%);
    box-shadow:0 24px 60px rgba(43,32,19,.30), inset 0 1px 0 rgba(255,255,255,.6);
    position:relative; overflow:hidden;
  }
  .modal h2{font-family:'Fraunces', serif; font-style:italic; font-size:22px; margin:0 0 8px 0;}
  .modal p.sub{color:var(--ink-soft); font-size:13px; margin:0 0 22px 0; line-height:1.5; font-family:'Space Mono',monospace;}
  .modal label{font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:1.5px; display:block; margin-bottom:8px; font-family:'Space Mono',monospace;}
  .modal .grp{margin-bottom:16px;}

  ::selection{background:var(--mustard); color:var(--ink);}
</style>
</head>
<body>
<div id="appShell">
  <div id="topFixed">
    <header>
      <div class="wordmark-wrap">
        <div class="wordmark">DUO</div>
        <div class="eyebrow">Questions à deux</div>
      </div>
      <button class="gear-btn" id="gearBtn">⚙︎</button>
    </header>
    <div class="identity-bar" id="identityBar"></div>
  </div>

  <div id="scrollArea">
    <div id="app">
      <main id="main"></main>
    </div>
  </div>

  <nav class="tabbar">
    <div class="tab-inner">
      <button class="tab-btn" data-tab="add"><span class="ic">✍️</span>Ajouter</button>
      <button class="tab-btn" data-tab="pending"><span class="ic">🔏</span>En attente</button>
      <button class="tab-btn" data-tab="revealed"><span class="ic">💌</span>Révélées</button>
    </div>
  </nav>
</div>

<div id="modalRoot"></div>

<script>
(function(){
  "use strict";

  const CATEGORIES = [
    {id:'amour',    label:'Amour',     emoji:'❤️', color:'#A8283B'},
    {id:'fun',      label:'Fun',       emoji:'🎉', color:'#E2A317'},
    {id:'profond',  label:'Profond',   emoji:'🌊', color:'#136B60'},
    {id:'souvenirs',label:'Souvenirs', emoji:'📸', color:'#7D5A78'},
    {id:'futur',    label:'Futur',     emoji:'🚀', color:'#2E5C8A'},
    {id:'piquant',  label:'Piquant',   emoji:'🌶️', color:'#C9431D'},
    {id:'autre',    label:'Autre',     emoji:'💭', color:'#6B6650'},
  ];

  const STORAGE_KEY = 'duo_state_v1';

  // Wrapper de stockage : utilise le stockage persistant de l'artefact quand
  // disponible (window.storage), sinon retombe sur localStorage — ce qui
  // permet à l'appli de garder ses données à la fois dans l'aperçu Claude
  // et une fois déployée telle quelle (ex. GitHub Pages).
  const hasArtifactStorage = (typeof window !== 'undefined') && !!window.storage;

  async function storageGet(key){
    if(hasArtifactStorage){
      try{
        const res = await window.storage.get(key, false);
        return res ? res.value : null;
      }catch(e){ return null; }
    }
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }

  async function storageSet(key, value){
    if(hasArtifactStorage){
      // Une seule tentative + un seul retry ; les écritures concurrentes sur
      // plusieurs clés en même temps peuvent faire échouer le pont de stockage.
      for(let attempt=0; attempt<2; attempt++){
        try{ await window.storage.set(key, value, false); return; }
        catch(e){
          console.error('storage set failed', e);
          if(attempt===0) await new Promise(r=>setTimeout(r,300));
        }
      }
      return;
    }
    try{ localStorage.setItem(key, value); }catch(e){ console.error('storage set failed', e); }
  }

  let state = {
    partners: null,
    current: null,
    questions: [],
    tab: 'add',
    selectedCat: null,
    loaded: false
  };

  let saveQueue = Promise.resolve();

  async function loadState(){
    const raw = await storageGet(STORAGE_KEY);
    let data = null;
    try{ data = raw ? JSON.parse(raw) : null; }catch(e){ data = null; }
    state.partners = data && data.partners ? data.partners : null;
    state.current = data && data.current ? data.current : null;
    state.questions = data && data.questions ? data.questions : [];
    state.loaded = true;
  }

  function save(){
    const snapshot = JSON.stringify({
      partners: state.partners,
      current: state.current,
      questions: state.questions
    });
    // Les écritures sont enchaînées une par une (jamais en parallèle) pour
    // éviter de perturber le pont de stockage de l'artefact.
    saveQueue = saveQueue.then(()=> storageSet(STORAGE_KEY, snapshot));
  }

  function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

  function catInfo(id){ return CATEGORIES.find(c=>c.id===id) || CATEGORIES[CATEGORIES.length-1]; }

  function otherPartner(name){
    if(!state.partners) return '';
    return name === state.partners.p1 ? state.partners.p2 : state.partners.p1;
  }

  function partnerSlot(name){
    if(!state.partners) return 'p1';
    return name === state.partners.p1 ? 'p1' : 'p2';
  }

  function fmtDate(ts){
    const d = new Date(ts);
    return d.toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
  }

  /* ---------- SETUP MODAL ---------- */
  function renderSetupModal(){
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="modal-overlay">
        <div class="modal">
          <h2>Bienvenue</h2>
          <p class="sub">Entrez vos deux prénoms pour commencer à vous poser des questions.</p>
          <div class="grp">
            <label>Prénom 1</label>
            <input type="text" id="p1input" value="Hugo" placeholder="Prénom 1">
          </div>
          <div class="grp">
            <label>Prénom 2</label>
            <input type="text" id="p2input" value="Charline" placeholder="Prénom 2">
          </div>
          <button class="submit-btn" id="setupSave">Commencer</button>
        </div>
      </div>`;
    document.getElementById('setupSave').onclick = ()=>{
      const p1 = document.getElementById('p1input').value.trim() || 'Partenaire 1';
      const p2 = document.getElementById('p2input').value.trim() || 'Partenaire 2';
      state.partners = {p1, p2};
      state.current = p1;
      save();
      root.innerHTML = '';
      renderAll();
    };
  }

  function renderEditPartnersModal(){
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="modal-overlay" id="editOverlay">
        <div class="modal">
          <h2>Paramètres</h2>
          <p class="sub">Modifiez vos prénoms si besoin.</p>
          <div class="grp">
            <label>Prénom 1</label>
            <input type="text" id="ep1" value="${state.partners.p1}">
          </div>
          <div class="grp">
            <label>Prénom 2</label>
            <input type="text" id="ep2" value="${state.partners.p2}">
          </div>
          <button class="submit-btn" id="editSave">Enregistrer</button>
        </div>
      </div>`;
    document.getElementById('editOverlay').addEventListener('click', (e)=>{
      if(e.target.id === 'editOverlay') root.innerHTML = '';
    });
    document.getElementById('editSave').onclick = ()=>{
      const oldP1 = state.partners.p1, oldP2 = state.partners.p2;
      const newP1 = document.getElementById('ep1').value.trim() || oldP1;
      const newP2 = document.getElementById('ep2').value.trim() || oldP2;
      if(state.current === oldP1) state.current = newP1;
      else if(state.current === oldP2) state.current = newP2;
      state.partners = {p1:newP1, p2:newP2};
      save();
      root.innerHTML = '';
      renderAll();
    };
  }

  /* ---------- IDENTITY BAR ---------- */
  function renderIdentityBar(){
    const bar = document.getElementById('identityBar');
    if(!state.partners){ bar.innerHTML = ''; return; }
    const {p1, p2} = state.partners;
    bar.innerHTML = `
      <div class="id-pill p1 ${state.current===p1?'active p1':''}" data-name="${p1}"><span class="dot"></span>${p1}</div>
      <div class="id-pill p2 ${state.current===p2?'active p2':''}" data-name="${p2}"><span class="dot"></span>${p2}</div>
    `;
    bar.querySelectorAll('.id-pill').forEach(el=>{
      el.onclick = ()=>{ state.current = el.dataset.name; save(); renderAll(); };
    });
  }

  /* ---------- TAB: ADD ---------- */
  function renderAdd(){
    const main = document.getElementById('main');
    main.innerHTML = `
      <div class="section-head">
        <h1 class="display">Nouvelle question</h1>
        <p>Elle sera posée par ${state.current}.</p>
      </div>
      <div class="field-label">Catégorie</div>
      <div class="chip-row" id="catRow">
        ${CATEGORIES.map(c=>`<div class="chip" data-cat="${c.id}">${c.emoji} ${c.label}</div>`).join('')}
      </div>
      <div class="field-label">Ta question</div>
      <textarea id="qInput" placeholder="Écris ta question ici…" maxlength="300"></textarea>
      <button class="submit-btn" id="addBtn" disabled>Ajouter la question</button>
    `;

    const catRow = document.getElementById('catRow');
    catRow.querySelectorAll('.chip').forEach(chip=>{
      chip.onclick = ()=>{
        catRow.querySelectorAll('.chip').forEach(c=>{ c.classList.remove('selected'); c.style.background=''; c.style.color=''; c.style.borderColor=''; });
        chip.classList.add('selected');
        const info = catInfo(chip.dataset.cat);
        chip.style.background = info.color + 'E6'; chip.style.color = 'var(--paper)'; chip.style.borderColor = 'transparent';
        state.selectedCat = chip.dataset.cat;
        checkAddValid();
      };
    });

    const qInput = document.getElementById('qInput');
    qInput.oninput = checkAddValid;

    function checkAddValid(){
      const btn = document.getElementById('addBtn');
      btn.disabled = !(state.selectedCat && qInput.value.trim().length > 2);
    }

    document.getElementById('addBtn').onclick = ()=>{
      const text = qInput.value.trim();
      if(!text || !state.selectedCat) return;
      state.questions.unshift({
        id: uid(),
        category: state.selectedCat,
        text,
        author: state.current,
        createdAt: Date.now(),
        answers: { p1: null, p2: null }
      });
      state.selectedCat = null;
      save();
      renderTabBadges();
      renderAdd();
    };
  }

  /* ---------- TAB: PENDING (unanswered) ---------- */
  function renderPending(){
    const main = document.getElementById('main');
    const mySlot = partnerSlot(state.current);
    const otherSlot = mySlot === 'p1' ? 'p2' : 'p1';

    const pending = state.questions.filter(q => !(q.answers.p1 && q.answers.p2));

    main.innerHTML = `
      <div class="section-head">
        <h1 class="display">En attente</h1>
        <p>Scellées tant que vous n'avez pas répondu tous les deux.</p>
      </div>
      <div id="pendingList"></div>
    `;
    const list = document.getElementById('pendingList');

    if(pending.length === 0){
      list.innerHTML = `<div class="empty"><span class="emoji">🎉</span><p>Aucune question en attente.<br>Ajoutez-en une nouvelle !</p></div>`;
      return;
    }

    list.innerHTML = pending.map(q=>{
      const info = catInfo(q.category);
      const myAnswer = q.answers[mySlot];
      const otherName = otherPartner(state.current);

      let statusHtml = '';
      if(myAnswer){
        statusHtml = `<div class="status-row"><span class="pulse-dot"></span>Réponse enregistrée — en attente de ${otherName}</div>`;
      } else {
        statusHtml = `
          <div class="answer-form">
            <textarea placeholder="Ta réponse…" data-answer-for="${q.id}" maxlength="500"></textarea>
            <button class="mini-btn" data-submit="${q.id}" style="background:${info.color}A6">Valider ma réponse</button>
          </div>`;
      }

      return `
        <div class="card">
          <div class="postmark"><span>SCELLÉ</span></div>
          <div class="card-top">
            <span class="cat-tag" style="background:${info.color}E0">${info.emoji} ${info.label}</span>
            <button class="del-btn" data-del="${q.id}">✕</button>
          </div>
          <p class="q-text">${escapeHtml(q.text)}</p>
          <div class="q-meta">Posée par ${q.author} · ${fmtDate(q.createdAt)}</div>
          ${statusHtml}
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-submit]').forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.dataset.submit;
        const ta = list.querySelector(`textarea[data-answer-for="${id}"]`);
        const val = ta.value.trim();
        if(!val) return;
        const q = state.questions.find(x=>x.id===id);
        q.answers[mySlot] = val;
        save();
        renderTabBadges();
        renderPending();
      };
    });

    list.querySelectorAll('[data-del]').forEach(btn=>{
      btn.onclick = ()=>{
        if(confirm('Supprimer cette question ?')){
          state.questions = state.questions.filter(x=>x.id!==btn.dataset.del);
          save();
          renderTabBadges();
          renderPending();
        }
      };
    });
  }

  /* ---------- TAB: REVEALED (both answered) ---------- */
  function renderRevealed(){
    const main = document.getElementById('main');
    const revealed = state.questions.filter(q => q.answers.p1 && q.answers.p2);

    main.innerHTML = `
      <div class="section-head">
        <h1 class="display">Révélées</h1>
        <p>Vous avez répondu tous les deux — voici vos réponses.</p>
      </div>
      <div id="revealedList"></div>
    `;
    const list = document.getElementById('revealedList');

    if(revealed.length === 0){
      list.innerHTML = `<div class="empty"><span class="emoji">🔮</span><p>Rien à révéler pour l'instant.<br>Répondez à une question pour la débloquer.</p></div>`;
      return;
    }

    list.innerHTML = revealed.map(q=>{
      const info = catInfo(q.category);
      const {p1, p2} = state.partners;
      return `
        <div class="card">
          <div class="postmark" style="border-color:var(--teal); opacity:.4;"><span>OUVERT</span></div>
          <div class="card-top">
            <span class="cat-tag" style="background:${info.color}E0">${info.emoji} ${info.label}</span>
            <button class="del-btn" data-del="${q.id}">✕</button>
          </div>
          <p class="q-text">${escapeHtml(q.text)}</p>
          <div class="q-meta" style="margin-bottom:8px;">Posée par ${q.author} · ${fmtDate(q.createdAt)}</div>
          <div class="answers">
            <div class="answer-bubble" style="border-color:rgba(217,83,30,.5)">
              <div class="who"><span class="avatar" style="background:var(--rust)">${p1[0].toUpperCase()}</span>${p1}</div>
              <p>${escapeHtml(q.answers.p1)}</p>
            </div>
            <div class="answer-bubble" style="border-color:rgba(19,107,96,.5)">
              <div class="who"><span class="avatar" style="background:var(--teal)">${p2[0].toUpperCase()}</span>${p2}</div>
              <p>${escapeHtml(q.answers.p2)}</p>
            </div>
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-del]').forEach(btn=>{
      btn.onclick = ()=>{
        if(confirm('Supprimer cette question ?')){
          state.questions = state.questions.filter(x=>x.id!==btn.dataset.del);
          save();
          renderTabBadges();
          renderRevealed();
        }
      };
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ---------- TAB NAV ---------- */
  function renderTabBadges(){
    const pendingCount = state.questions.filter(q => !(q.answers.p1 && q.answers.p2)).length;
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.tab === state.tab);
      const existingBadge = btn.querySelector('.badge');
      if(existingBadge) existingBadge.remove();
      if(btn.dataset.tab === 'pending' && pendingCount > 0){
        const b = document.createElement('span');
        b.className = 'badge';
        b.textContent = pendingCount;
        btn.appendChild(b);
      }
    });
  }

  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick = ()=>{
      state.tab = btn.dataset.tab;
      renderMain();
      renderTabBadges();
    };
  });

  document.getElementById('gearBtn').onclick = ()=>{
    if(state.partners) renderEditPartnersModal();
  };

  function renderMain(){
    if(state.tab === 'add') renderAdd();
    else if(state.tab === 'pending') renderPending();
    else renderRevealed();
  }

  function renderAll(){
    if(!state.partners){
      renderSetupModal();
      document.getElementById('main').innerHTML = '';
      document.getElementById('identityBar').innerHTML = '';
      return;
    }
    if(!state.current) state.current = state.partners.p1;
    renderIdentityBar();
    renderMain();
    renderTabBadges();
  }

  (async function init(){
    document.getElementById('main').innerHTML = `<div class="empty"><p>Chargement…</p></div>`;
    await loadState();
    renderAll();
  })();
})();
</script>
</body>
</html>
